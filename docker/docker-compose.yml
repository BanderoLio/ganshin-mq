services:
  broko:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "5672:5672"
    volumes:
      - broko-data:/var/lib/broko
    environment:
      - BROKO_USERS_FILE=/var/lib/broko/broker.users
    healthcheck:
      test: ["CMD-SHELL", "ss -ltn | grep -q 5672"]
      interval: 2s
      timeout: 5s
      retries: 10

  publisher:
    build:
      context: ..
      dockerfile: docker/demo/Dockerfile
    command: node publisher/index.js
    environment:
      - BROKER_URL=amqp://guest:guest@broko:5672/
      - INTERVAL_MS=2000
    depends_on:
      broko:
        condition: service_healthy

  subscriber-all:
    build:
      context: ..
      dockerfile: docker/demo/Dockerfile
    command: node subscriber/index.js
    environment:
      - BROKER_URL=amqp://guest:guest@broko:5672/
      - QUEUE_NAME=all-orders
      - BINDING_KEY=order.#
    depends_on:
      broko:
        condition: service_healthy

  subscriber-high:
    build:
      context: ..
      dockerfile: docker/demo/Dockerfile
    command: node subscriber/index.js
    environment:
      - BROKER_URL=amqp://guest:guest@broko:5672/
      - QUEUE_NAME=high-priority-orders
      - BINDING_KEY=order.high
    depends_on:
      broko:
        condition: service_healthy

  rpc-server:
    build:
      context: ..
      dockerfile: docker/demo/Dockerfile
    command: node rpc-server/index.js
    environment:
      - BROKER_URL=amqp://guest:guest@broko:5672/
    depends_on:
      broko:
        condition: service_healthy

  # RPC-клиент использует самописный SDK (broko-client) — закрывает требование
  # этапа 3 ТЗ о наличии собственного SDK и одновременно замыкает RPC-демо.
  rpc-client:
    build:
      context: ..
      dockerfile: docker/demo/Dockerfile
    command: node rpc-client/index.js
    environment:
      - BROKER_URL=amqp://guest:guest@broko:5672/
      - INTERVAL_MS=3000
    depends_on:
      broko:
        condition: service_healthy

  # Параллельный publisher на самописном SDK — демонстрирует, что брокер
  # совместим как с эталонным amqplib, так и с собственным клиентом.
  publisher-sdk:
    build:
      context: ..
      dockerfile: docker/demo/Dockerfile
    command: node publisher-sdk/index.js
    environment:
      - BROKER_URL=amqp://guest:guest@broko:5672/
      - INTERVAL_MS=3000
    depends_on:
      broko:
        condition: service_healthy

  subscriber-sdk:
    build:
      context: ..
      dockerfile: docker/demo/Dockerfile
    command: node subscriber-sdk/index.js
    environment:
      - BROKER_URL=amqp://guest:guest@broko:5672/
      - QUEUE_NAME=sdk-order-processor
      - BINDING_KEY=order.#
    depends_on:
      broko:
        condition: service_healthy

  webui:
    build:
      context: ..
      dockerfile: docker/webui/Dockerfile
    ports:
      - "15672:15672"
    volumes:
      - broko-data:/var/lib/broko:ro
    environment:
      - PORT=15672
      - STATS_FILE=/var/lib/broko/stats.json
      - WEBUI_USER=admin
      - WEBUI_PASS=admin
    depends_on:
      broko:
        condition: service_healthy

volumes:
  broko-data:
